title = "Cheuk 的部落格"
baseURL = 'https://cheuk-blog.github.io/'
languageCode = 'zh-tw'
theme = "hugo-theme-stack"

[module]
  [[module.imports]]
    path = "github.com/CaiJimmy/hugo-theme-stack/v3"

# Redirect
# in layouts/index.html

# Side-wide settings
[params]
  mainsections = ["post"]
  favicon = "/favicon.ico"

# Custom Menu
[menu]
  [[menu.main]]
      name = "首頁"
      url = "/home"
      weight = 10
      identifier = "home"
      [menu.main.params]
          icon = "chevron-right"
          newTab = false
  [[menu.main]]
      name = "文章"
      url = "/posts"
      weight = 20
      identifier = "posts"
      [menu.main.params]
          icon = "chevron-right"
          newTab = false
  [[menu.main]]
      name = "關於"
      url = "/about"
      weight = 30
      identifier = "about"
      [menu.main.params]
          icon = "chevron-right"
          newTab = false

  [[menu.social]]
  name = "rss"
  url = "https://cheuk-blog.github.io/posts/index.xml"
  weight = 50
  [menu.social.params]
    icon = "rss"
    newTab = true

# Sidebar
[params.sidebar]
  emoji = "🚂"
  subtitle = "噗哈哈（パヒャヒャッ！）"
  avatar.enabled = true
  avatar.src = "images/avatar.png"

# Article
[params.article]
  readingtime = false
