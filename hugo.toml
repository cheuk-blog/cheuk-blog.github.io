baseURL = 'https://cheuk-blog.github.io/'
languageCode = 'zh-tw'
title = 'Cheuk-Blog'
theme = "hugo-theme-stack"
[[module.imports]]
path = "github.com/CaiJimmy/hugo-theme-stack/v3"

  # 評論系統（可選）
  comments = { provider = "giscus" }      # 或 utterances / disqus / twikoo 等

  # 文章頁腳
  showFooterAuthor = true
  showPoweredBy = true

  # 日期格式ç
  dateFormat = "2006年1月2日"

  # 文章預設封面（如果文章沒有 featuredImage）
  #defaultFeaturedImage = "/images/default-cover.jpg"

  # 文章分類、標籤顯示
  showTaxonomies = true

  # 搜尋功能
  enableSearch = true

  # ========================
  # 選單（Navigation）
  # ========================
  [[menu.main]]
    identifier = "home"
    name = "首頁"
    url = "/"
    weight = -100
    [menu.main.params]
      icon = "chevron-right"

  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
    [menu.main.params]
      icon = "chevron-right"

  [[menu.main]]
    identifier = "about"
    name = "關於"
    url = "/about/"
    weight = 20
    [menu.main.params]
      icon = "chevron-right"